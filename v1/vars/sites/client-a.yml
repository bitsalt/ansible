---
# =============================================================================
# Site: client-a (WordPress)
# Copy this file for each WordPress site and adjust values.
# =============================================================================

site_name: client-a
site_domain: clienta.com
site_type: wordpress

# Docker image — override here to pin a site to a specific version
wp_image: "{{ wordpress_default_image }}"

# Database — connects to DO managed MySQL cluster
wp_db_host: "{{ vault_mysql_host }}:{{ vault_mysql_port }}"
wp_db_name: client_a
wp_db_user: client_a_user
wp_db_password: "{{ vault_client_a_db_password }}"
wp_table_prefix: wp_

---
# =============================================================================
# BitSalt — site.yml
# Top-level playbook. Runs all roles in dependency order.
#
# Usage:
#   Full run:
#     ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass
#
#   Limit to a specific role via tags:
#     ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass --tags traefik
#     ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass --tags wordpress
#     ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass --tags laravel
#     ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass --tags nodejs
#
#   Adding a new WordPress site:
#     1. Copy vars/sites/client-a.yml to vars/sites/new-client.yml
#     2. Fill in site values and add DB password to vault.yml
#     3. Add the new site to the wordpress_sites list below
#     4. Run: ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass --tags wordpress
#
# =============================================================================

- name: BitSalt Droplet provisioning
  hosts: droplet
  become: true

  vars_files:
    # Site var files — add a new entry here for each site
    - vars/sites/client-a.yml        # loaded as hostvars; used via wordpress_sites list below
    - vars/sites/laravel-site.yml    # loaded as laravel_site in the laravel role
    - vars/sites/node-site-1.yml     # loaded via nodejs_sites list below
    # - vars/sites/node-site-2.yml   # uncomment when node-site-2 is ready

  vars:
    # WordPress sites — add a new dict here for each WP site.
    # Keys must match the var names defined in each site's vars file.
    wordpress_sites:
      - site_name: client-a
        site_domain: clienta.com
        wp_image: "wordpress:6.6-php8.2-fpm"
        wp_db_host: "{{ vault_mysql_host }}:{{ vault_mysql_port }}"
        wp_db_name: client_a
        wp_db_user: client_a_user
        wp_db_password: "{{ vault_client_a_db_password }}"
        wp_table_prefix: wp_
      # Add additional WordPress sites here:
      # - site_name: client-b
      #   site_domain: clientb.com
      #   wp_image: "wordpress:6.6-php8.2-fpm"
      #   wp_db_host: "{{ vault_mysql_host }}:{{ vault_mysql_port }}"
      #   wp_db_name: client_b
      #   wp_db_user: client_b_user
      #   wp_db_password: "{{ vault_client_b_db_password }}"
      #   wp_table_prefix: wp_

    # Node.js sites — add a new dict here for each Node.js site.
    nodejs_sites:
      - site_name: node-site-1
        site_domain: nodesite1.com
        node_image: "yourdockerhub/node-site-1:latest"
        node_port: 3000
        node_env: production
        node_db_url: "postgresql://node1_user:{{ vault_node_site_1_db_password }}@{{ vault_pg_host }}:{{ vault_pg_port }}/node_site_1?sslmode=require"
      # - site_name: node-site-2
      #   site_domain: nodesite2.com
      #   node_image: "yourdockerhub/node-site-2:latest"
      #   node_port: 3000
      #   node_env: production
      #   node_db_url: "postgresql://node2_user:{{ vault_node_site_2_db_password }}@{{ vault_pg_host }}:{{ vault_pg_port }}/node_site_2?sslmode=require"

    # Laravel — single site, loaded from vars/sites/laravel-site.yml
    # The laravel role references it as laravel_site directly.
    # No list needed — extend to a loop if you ever add a second Laravel site.
    laravel_site:
      site_name: laravel-site
      site_domain: laravelsite.com
      laravel_image: "yourdockerhub/laravel-site:latest"
      laravel_app_env: production
      laravel_app_debug: "false"
      laravel_app_key: "{{ vault_laravel_app_key }}"
      laravel_db_host: "{{ vault_mysql_host }}"
      laravel_db_port: "{{ vault_mysql_port }}"
      laravel_db_name: laravel_site
      laravel_db_user: laravel_user
      laravel_db_password: "{{ vault_laravel_site_db_password }}"
      laravel_queue_enabled: true

  roles:
    - role: common
      tags: [common]

    - role: docker
      tags: [docker]

    - role: traefik
      tags: [traefik]

    - role: wordpress
      tags: [wordpress]
      loop: "{{ wordpress_sites }}"
      loop_control:
        loop_var: item
        label: "{{ item.site_name }}"

    - role: laravel
      tags: [laravel]

    - role: nodejs
      tags: [nodejs]
      loop: "{{ nodejs_sites }}"
      loop_control:
        loop_var: item
        label: "{{ item.site_name }}"

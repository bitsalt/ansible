---
# =============================================================================
# Role: common
# Creates base directory structure and ensures the deploy user's site
# directories exist. Does not manage the deploy user itself — that is
# handled manually per the bootstrap process.
# =============================================================================

- name: Create sites base directory
  ansible.builtin.file:
    path: "{{ sites_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create proxy directory
  ansible.builtin.file:
    path: "{{ proxy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create backups directory
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create scripts directory
  ansible.builtin.file:
    path: "{{ scripts_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - python3-pip
      - acl              # required for Ansible to set ACLs on files
      - mysql-client     # for manual DB access from the Droplet
    state: present
    update_cache: true

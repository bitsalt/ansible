[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
vault_password_file = ~/.bitsalt_vault_pass   # optional: store vault password in a file
                                               # outside the repo. Remove this line if you
                                               # prefer to type --ask-vault-pass each run.
host_key_checking  = True
stdout_callback    = yaml
callbacks_enabled  = timer

[ssh_connection]
pipelining         = True                      # speeds up playbook runs significantly
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s

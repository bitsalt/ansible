# =============================================================================
# ANSIBLE VAULT — encrypt this file before committing to git:
#   ansible-vault encrypt group_vars/all/vault.yml
#
# To edit after encryption:
#   ansible-vault edit group_vars/all/vault.yml
#
# All vault variables are prefixed with vault_ by convention.
# Reference them in vars.yml or templates as {{ vault_<name> }}.
# =============================================================================

# Traefik
vault_traefik_acme_email: "you@bitsalt.com"

# DigitalOcean managed MySQL
vault_mysql_host: "your-managed-mysql-host.db.ondigitalocean.com"
vault_mysql_port: "25060"

# DigitalOcean managed PostgreSQL
vault_pg_host: "your-managed-pg-host.db.ondigitalocean.com"
vault_pg_port: "25060"

# Per-site DB credentials are defined in vars/sites/<site>.yml
# and their sensitive values stored in a per-site vault section below,
# or in a separate vault file if you prefer tighter separation.
#
# Example pattern used in site var files:
#   db_password: "{{ vault_client_a_db_password }}"

vault_client_a_db_password: "CHANGEME"
vault_laravel_site_db_password: "CHANGEME"
vault_node_site_1_db_password: "CHANGEME"
vault_node_site_2_db_password: "CHANGEME"

# Laravel app key (generate with: php artisan key:generate --show)
vault_laravel_app_key: "base64:CHANGEME"

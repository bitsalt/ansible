---
frujo:
  enabled: true
  site_name: frujo
  site_domain: frujo.net
  image: "bitsalt/frujo-finance:latest"
  port: 3000
  env_vars:
    NODE_ENV: production
    PORT: 3001
    TRUST_PROXY: 1
    SITE_DOMAIN: frujo.net
    SERVICE_NAME: frujo
    DATABASE_URL: "postgresql://frujo_fin:{{ vault_frujo_db_password }}@{{ vault_pg_host }}:{{ vault_pg_port }}/frujo_finance"
    SESSION_SECRET: "{{ vault_frujo_session_secret }}"
    FRONTEND_URL: "https://frujo.net"
    ANTHROPIC_API_KEY: "{{ vault_frujo_anthropic_api_key }}"
    IMPORT_MODEL: claude-haiku-4-5-20251001
    DATABASE_CA_CERT: "{{ vault_pg_ca_cert }}"

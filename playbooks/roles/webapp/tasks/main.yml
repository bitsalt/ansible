---
# =============================================================================
# Role: webapp
# Generic "stateless HTTP container behind Traefik" role. Used for Node.js and
# FastAPI (Python) sites — any app that publishes a single HTTP port and
# reads config from env vars. Looped from site.yml via the nodejs_sites and
# fastapi_sites lists.
#
# Ownership boundary: Ansible owns the site directory and the Vault-sourced
# .env file. The app repo owns docker-compose.yml and the deploy flow
# (build/push/pull). First-time bootstrap for a new site is: (1) run this
# role to create dir + .env, (2) run the app repo's deploy flow to land
# docker-compose.yml and bring the container up. Subsequent .env changes
# are picked up by `recreate: auto` below — compose v2 hashes env_file
# content and recreates the container accordingly.
# =============================================================================

- name: Create site directory
  ansible.builtin.file:
    path: "{{ sites_base_dir }}/{{ item.site_name }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ sites_base_dir }}/{{ item.site_name }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  no_log: true

- name: Check whether app repo has deployed docker-compose.yml
  ansible.builtin.stat:
    path: "{{ sites_base_dir }}/{{ item.site_name }}/docker-compose.yml"
  register: compose_file

- name: Start webapp site
  community.docker.docker_compose_v2:
    project_src: "{{ sites_base_dir }}/{{ item.site_name }}"
    state: present
    recreate: auto
  when: compose_file.stat.exists

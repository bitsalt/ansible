---
# =============================================================================
# webapp role — input schema
#
# Validated by Ansible at role entry. Callers that omit required fields or
# pass the wrong type fail loudly here instead of silently producing a
# malformed docker-compose.yml or .env.
#
# Consumed by site.yml via `loop:` — `item` is the per-site config dict
# declared in vars/sites/<name>.yml.
# =============================================================================

argument_specs:
  main:
    short_description: Deploy a stateless HTTP container behind Traefik.
    description: >
      Generic role for Node.js, FastAPI, and similar apps that expose a
      single HTTP port and take config via environment variables. Runtime-
      specific concerns (build, workers, dependencies) live inside the
      container image, not in Ansible.
    options:
      item:
        description: Per-site config dict (loop var).
        type: dict
        required: true
        options:
          enabled:
            type: bool
            required: true
            description: >
              Upstream gate (selectattr in site.yml drops disabled sites).
              Always true when the role body runs; declared here so the
              schema matches the on-disk site vars file shape.
          site_name:
            type: str
            required: true
            description: Short identifier; used in directory, container, and Traefik router names.
          site_domain:
            type: str
            required: true
            description: Public hostname; becomes the Traefik Host() rule.
          image:
            type: str
            required: true
            description: Docker image reference, e.g. `org/repo:tag`.
          port:
            type: int
            required: true
            description: Container port Traefik routes to.
          env_vars:
            type: dict
            required: true
            description: Key/value pairs rendered into the site's .env file.
          www_redirect:
            type: bool
            required: false
            default: true
            description: When true, emit a `www.<domain>` 301 → apex router block.

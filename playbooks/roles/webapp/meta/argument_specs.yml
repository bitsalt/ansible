---
# =============================================================================
# webapp role — input schema
#
# Validated by Ansible at role entry. Callers that omit required fields or
# pass the wrong type fail loudly here instead of silently producing a
# malformed docker-compose.yml or .env.
#
# Consumed by site.yml via `loop:` — `item` is the per-site config dict
# declared in vars/sites/<name>.yml.
# =============================================================================

argument_specs:
  main:
    short_description: Provision the site directory and Vault-sourced .env for a stateless HTTP app.
    description: >
      Generic role for Node.js, FastAPI, and similar apps that expose a
      single HTTP port and take config via environment variables. Ansible
      owns the site directory and the .env file; the app repo owns
      docker-compose.yml and the build/push/pull deploy flow.

      Several fields on the per-site dict (site_domain, image, port,
      www_redirect) are declared here for schema completeness and
      single-source-of-truth — but are consumed by the app repo's
      docker-compose.yml, not by any Ansible task in this role.
    options:
      item:
        description: Per-site config dict (loop var).
        type: dict
        required: true
        options:
          enabled:
            type: bool
            required: true
            description: >
              Upstream gate (selectattr in site.yml drops disabled sites).
              Always true when the role body runs; declared here so the
              schema matches the on-disk site vars file shape.
          site_name:
            type: str
            required: true
            description: >
              Short identifier. Used by this role for the site directory
              name; also used downstream by the app repo's compose for
              container and Traefik router names.
          site_domain:
            type: str
            required: true
            description: >
              Public hostname. Consumed by the app repo's
              docker-compose.yml (Traefik Host rule); not used by this role.
          image:
            type: str
            required: true
            description: >
              Docker image reference. Consumed by the app repo's
              docker-compose.yml; not used by this role.
          port:
            type: int
            required: true
            description: >
              Container port. Consumed by the app repo's
              docker-compose.yml (Traefik service port); not used by this role.
          env_vars:
            type: dict
            required: true
            description: Key/value pairs rendered into the site's .env file.
          www_redirect:
            type: bool
            required: false
            default: true
            description: >
              When true, the app repo's docker-compose.yml should emit a
              `www.<domain>` 301 → apex router block. Not used by this role.

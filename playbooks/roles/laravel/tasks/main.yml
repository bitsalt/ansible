---
# =============================================================================
# Role: laravel
# Deploys the Laravel site. Single site — no loop needed.
# Uses laravel_site var loaded from vars/sites/laravel-site.yml in site.yml.
# =============================================================================

- name: Create site directory
  ansible.builtin.file:
    path: "{{ sites_base_dir }}/{{ laravel_site.site_name }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Create storage bind mount directory
  ansible.builtin.file:
    path: "{{ sites_base_dir }}/{{ laravel_site.site_name }}/storage"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ sites_base_dir }}/{{ laravel_site.site_name }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ sites_base_dir }}/{{ laravel_site.site_name }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  no_log: true

- name: Start Laravel site
  community.docker.docker_compose_v2:
    project_src: "{{ sites_base_dir }}/{{ laravel_site.site_name }}"
    state: present
    recreate: auto

- name: Deploy Laravel scheduler cron
  ansible.builtin.cron:
    name: "Laravel scheduler - {{ laravel_site.site_name }}"
    minute: "*"
    hour: "*"
    day: "*"
    month: "*"
    weekday: "*"
    job: >
      cd {{ sites_base_dir }}/{{ laravel_site.site_name }} &&
      docker compose exec -T app php artisan schedule:run >> /dev/null 2>&1
    user: "{{ deploy_user }}"

---
# =============================================================================
# Role: traefik
# Deploys the Traefik reverse proxy stack into /opt/proxy.
# Manages the docker-compose.yml and letsencrypt directory.
# =============================================================================

- name: Ensure letsencrypt storage directory exists
  ansible.builtin.file:
    path: "{{ proxy_dir }}/letsencrypt"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create acme.json with correct permissions
  ansible.builtin.file:
    path: "{{ proxy_dir }}/letsencrypt/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Deploy socket proxy nginx config
  ansible.builtin.template:
    src: socket-proxy.conf.j2
    dest: "{{ proxy_dir }}/socket-proxy.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Deploy Traefik docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ proxy_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Start Traefik stack
  community.docker.docker_compose_v2:
    project_src: "{{ proxy_dir }}"
    state: present
    pull: always
    recreate: always

---
# =============================================================================
# lint.yml
#
# Runs ansible-lint and yamllint against playbooks/ on push and pull requests.
# Both must exit 0 for the workflow to pass.
#
# Versions are pinned in requirements.txt; update there, not here.
# =============================================================================

name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: ansible-lint + yamllint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install -r requirements.txt

      - name: Run yamllint
        run: yamllint playbooks/

      - name: Run ansible-lint
        run: ansible-lint playbooks/

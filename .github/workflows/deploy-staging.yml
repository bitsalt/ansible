# =============================================================================
# deploy-staging.yml
#
# Deploys bitsalt.com to dev.bitsalt.com on push to the 'staging' branch.
#
# IMPORTANT: This workflow belongs in the bitsalt.com app repository, not here.
# It is stored in this repo as a reference template.
#
# Required GitHub Secrets (set in the app repo):
#   DOCKER_USERNAME   — Docker Hub username
#   DOCKER_PASSWORD   — Docker Hub access token
#   DROPLET_HOST      — IP or hostname of the DigitalOcean Droplet
#   DEPLOY_SSH_KEY    — Private SSH key for the 'deploy' user
# =============================================================================

name: Deploy to Staging (dev.bitsalt.com)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Build, push, and deploy staging image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bitsalt/bitsalt-prod:staging
            bitsalt/bitsalt-prod:staging-${{ github.sha }}

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 2222
          script: |
            set -e
            cd /opt/sites/bitsalt-staging

            # Pull the new staging image and restart the container
            docker compose pull
            docker compose up -d

            # Record the deployed commit for rollback reference
            echo "bitsalt-staging staging-${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /opt/deployments.txt
